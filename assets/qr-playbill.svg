<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 520" width="460" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#03000a"/>
      <stop offset="50%" style="stop-color:#07021a"/>
      <stop offset="100%" style="stop-color:#0d0524"/>
    </linearGradient>
    <filter id="cyanGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- corner bracket marks -->
  </defs>

  <!-- Background -->
  <rect width="460" height="520" fill="url(#bgGrad)" rx="16"/>

  <!-- Grid lines -->
  <g opacity="0.07" stroke="#b482ff" stroke-width="1">
