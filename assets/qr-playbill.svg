  <circle cx="460" cy="520" r="120" fill="#ff2bd6" opacity="0.12" filter="url(#cyanGlow)"/>
  <circle cx="460" cy="0" r="80" fill="#00f0ff" opacity="0.10" filter="url(#cyanGlow)"/>

  <!-- Border -->
  <rect x="2" y="2" width="456" height="516" rx="15" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
  <rect x="6" y="6" width="448" height="508" rx="13" fill="none" stroke="#b624ff" stroke-width="0.5" opacity="0.3"/>

  <!-- Corner accent brackets -->
