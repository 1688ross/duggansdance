<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Velocity · DDC 2026 Playbill</title>
<meta name="theme-color" content="#03000a" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ============ VELOCITY PLAYBILL — BASE ============ */
:root {
  --accent-hue: 285;
  --glow: 1;
  --cyan: #00f0ff;
  --magenta: #ff2bd6;
  --purple: #b624ff;
  --violet: hsl(var(--accent-hue), 90%, 60%);
  --violet-2: hsl(calc(var(--accent-hue) - 40), 95%, 55%);
  --bg-0: #03000a;
  --bg-1: #07021a;
  --bg-2: #0d0524;
  --ink: #f4f0ff;
  --ink-dim: #9b96b8;
  --ink-faint: #5b5677;
  --line: rgba(180, 130, 255, 0.18);
  --line-strong: rgba(180, 130, 255, 0.35);
  --font-display: 'Orbitron', 'Audiowide', system-ui, sans-serif;
  --font-body: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'IBM Plex Mono', monospace;
}

[data-accent-mode="mono"] {
  --cyan: #d8d3ff;
  --magenta: #b6aef0;
  --purple: #9a91d6;
  --violet: #cfc7ff;
  --violet-2: #aea4ff;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-0);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body {
  background:
    radial-gradient(ellipse at 20% 0%, rgba(120, 30, 200, 0.18), transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(0, 200, 255, 0.12), transparent 50%),
    radial-gradient(ellipse at 50% 100%, rgba(255, 40, 200, 0.10), transparent 60%),
    linear-gradient(180deg, var(--bg-0), var(--bg-1) 50%, var(--bg-0));
  min-height: 100vh;
}

img { max-width: 100%; display: block; }

.app { position: relative; z-index: 1; }

/* ============ BACKGROUND ============ */
.bg-stage {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.bg-grid {
  position: absolute; inset: -10%;
  background-image:
    linear-gradient(rgba(180, 130, 255, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180, 130, 255, 0.08) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  transform: perspective(800px) rotateX(55deg) translateY(20%);
  transform-origin: 50% 100%;
  opacity: calc(0.45 * var(--glow));
  animation: gridShift 30s linear infinite;
}
@keyframes gridShift {
  from { background-position: 0 0, 0 0; }
  to   { background-position: 0 60px, 60px 0; }
}
.no-grid .bg-grid { display: none; }

.bg-glow { position: absolute; border-radius: 50%; filter: blur(80px); opacity: calc(0.35 * var(--glow)); }
.bg-glow-1 { width: 500px; height: 500px; background: var(--cyan); top: -10%; left: -10%; }
.bg-glow-2 { width: 400px; height: 400px; background: var(--magenta); top: 40%; right: -15%; }
.bg-glow-3 { width: 450px; height: 450px; background: var(--purple); bottom: -10%; left: 30%; }

.reduce-motion .bg-grid { animation: none; }

/* ============ TYPOGRAPHY ============ */
.neon-text {
  font-family: var(--font-display);
  font-weight: 800;
  letter-spacing: 0.08em;
  color: #fff;
  text-shadow:
    0 0 calc(8px * var(--glow)) var(--cyan),
    0 0 calc(20px * var(--glow)) var(--cyan),
    0 0 calc(40px * var(--glow)) var(--violet),
    0 0 calc(70px * var(--glow)) var(--magenta);
  position: relative;
}

.dim { color: var(--ink-dim); }

/* ============ COVER ============ */
.cover {
  position: relative;
  width: 100%;
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0 0 32px;
  z-index: 2;
}
.cover-image-wrap {
  position: relative;
  width: 100%;
  max-width: 480px;
  margin-top: max(env(safe-area-inset-top, 0px), 0px);
  overflow: visible;
}
.cover-image {
  width: 100%;
  height: auto;
  display: block;
  transform-origin: 50% 45%;
  filter: drop-shadow(0 0 40px rgba(0, 200, 255, 0.35)) drop-shadow(0 30px 60px rgba(180, 60, 255, 0.25));
  animation: coverGrow linear both;
  animation-timeline: scroll(root);
  animation-range: 0 100vh;
}

@keyframes coverGrow {
  from { transform: scale(0.78); }
  to   { transform: scale(1.22); }
}

/* Fallback for browsers without scroll-driven animations */
@supports not (animation-timeline: scroll()) {
  .cover-image {
    animation: coverGrowFallback 1.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes coverGrowFallback {
    from { transform: scale(0.78); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
}

.reduce-motion .cover-image {
  animation: none;
  transform: none;
}

.cover-cta {
  margin-top: 24px;
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 22px;
  background: linear-gradient(90deg, var(--violet-2), var(--violet));
  color: #fff;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.18em;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 999px;
  cursor: pointer;
  text-transform: uppercase;
  box-shadow:
    0 0 calc(20px * var(--glow)) var(--violet-2),
    0 0 calc(40px * var(--glow)) rgba(255, 43, 214, 0.4),
    inset 0 1px 0 rgba(255,255,255,0.3);
  transition: transform 0.15s ease, box-shadow 0.2s ease;
}
.cover-cta:hover { transform: translateY(-2px); }
.cover-cta:active { transform: translateY(0); }

/* ============ MASTHEAD ============ */
.masthead {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: rgba(5, 0, 18, 0.85);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  border-bottom: 1px solid var(--line);
}
.masthead-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.25em;
  color: #fff;
  text-shadow: 0 0 12px rgba(0,240,255,0.5);
}

/* ============ VELOCITY PLAYBILL — SECTIONS ============ */

.content { position: relative; z-index: 2; }

.page {
  padding: 56px 20px 24px;
  max-width: 720px;
  margin: 0 auto;
  scroll-margin-top: 60px;
}

/* ============ SECTION HEADER ============ */
.section-header { text-align: center; margin-bottom: 32px; }
.kicker {
  display: flex; align-items: center; gap: 10px;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 14px;
  text-shadow: 0 0 8px var(--cyan);
}
.kicker-line {
  height: 1px; width: 40px;
  background: linear-gradient(90deg, transparent, var(--cyan));
}
.kicker-line:last-child {
  background: linear-gradient(90deg, var(--cyan), transparent);
}
.section-title {
  font-size: clamp(28px, 7vw, 42px);
  margin: 0;
  line-height: 1.05;
}
.section-sub {
  margin-top: 12px;
  color: var(--ink-dim);
  font-size: 14px;
  letter-spacing: 0.04em;
  max-width: 36ch;
  margin-left: auto;
  margin-right: auto;
}

/* ============ DIVIDER ============ */
.divider {
  display: flex; align-items: center; gap: 14px;
  max-width: 320px;
  margin: 24px auto;
  color: var(--violet);
}
.div-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--violet), transparent);
  box-shadow: 0 0 8px var(--violet);
}
.div-bolt {
  filter: drop-shadow(0 0 8px var(--cyan));
  color: var(--cyan);
}

/* ============ WELCOME / LETTER ============ */
.letter {
  background: linear-gradient(180deg, rgba(20, 5, 45, 0.6), rgba(10, 2, 30, 0.6));
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 28px 22px;
  font-size: 15.5px;
  line-height: 1.65;
  color: var(--ink);
  position: relative;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset, 0 20px 50px rgba(0,0,0,0.5);
}
.letter::before {
  content: "";
  position: absolute; inset: -1px;
  border-radius: 16px;
  padding: 1px;
  background: linear-gradient(135deg, var(--cyan), transparent 40%, transparent 60%, var(--magenta));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.6;
  pointer-events: none;
}
.letter p { margin: 0 0 14px; }
.letter p:first-child::first-letter {
  font-family: var(--font-display);
  font-size: 2.3em;
  float: left;
  line-height: 1;
  padding: 2px 10px 0 0;
  color: var(--cyan);
  text-shadow: 0 0 12px var(--cyan);
}
.signature {
  display: flex; align-items: center; gap: 14px;
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px dashed var(--line);
}
.sig-line {
  width: 40px; height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  box-shadow: 0 0 10px var(--cyan);
  border-radius: 2px;
}
.sig-name {
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.08em;
  font-size: 14px;
  color: #fff;
}
.sig-role {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--ink-dim);
  text-transform: uppercase;
  margin-top: 2px;
}

/* ============ STAFF ============ */
.staff-owner {
  text-align: center;
  padding: 14px 0 22px;
  margin-bottom: 24px;
  position: relative;
}
.owner-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--cyan);
  text-shadow: 0 0 8px var(--cyan);
  padding: 6px 14px;
  border: 1px solid var(--cyan);
  border-radius: 999px;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.owner-name {
  font-size: clamp(16px, 3.5vw, 20px);
  line-height: 1.2;
}

.staff-group { margin-bottom: 28px; }
.group-label {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--magenta);
  text-shadow: 0 0 8px var(--magenta);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.staff-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
}
.staff-chip {
  padding: 14px 14px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: rgba(20, 5, 45, 0.5);
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.01em;
  position: relative;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.staff-chip:hover {
  border-color: var(--cyan);
  box-shadow: 0 0 16px rgba(0,240,255,0.3);
}
.staff-chip::before {
  content: ""; position: absolute; top: 8px; left: 8px;
  width: 4px; height: 4px;
  background: var(--cyan);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--cyan);
}
.staff-chip.alt::before { background: var(--magenta); box-shadow: 0 0 6px var(--magenta); }

/* ============ SENIORS ============ */
.senior-grid {
  display: grid;
  gap: 28px;
}
.senior-card.v2 {
  position: relative;
  border: 1px solid var(--line-strong);
  border-radius: 20px;
  padding: 22px 20px 24px;
  background:
    radial-gradient(ellipse at 0% 0%, rgba(0, 240, 255, 0.10), transparent 55%),
    radial-gradient(ellipse at 100% 100%, rgba(255, 43, 214, 0.10), transparent 55%),
    linear-gradient(180deg, rgba(20, 5, 45, 0.85), rgba(8, 2, 22, 0.9));
  overflow: hidden;
  box-shadow:
    0 30px 60px rgba(0, 0, 0, 0.5),
    0 0 0 1px rgba(255, 255, 255, 0.03) inset;
}
.senior-card.v2::before {
  content: "";
  position: absolute; inset: -1px;
  border-radius: 20px;
  padding: 1px;
  background: linear-gradient(135deg, var(--cyan), transparent 30%, transparent 70%, var(--magenta));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.7;
  pointer-events: none;
  z-index: 1;
}

.senior-watermark {
  position: absolute;
  right: -10px;
  bottom: -30px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(180px, 50vw, 240px);
  line-height: 0.85;
  color: transparent;
  -webkit-text-stroke: 1.5px rgba(180, 130, 255, 0.18);
  letter-spacing: -0.04em;
  pointer-events: none;
  z-index: 0;
}

.senior-photos {
  position: relative;
  margin-bottom: 18px;
  z-index: 2;
  padding-bottom: 60px; /* room for hanging inset photo */
}
.senior-photo {
  margin: 0;
  background: #000;
  border-radius: 10px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.05),
    0 20px 40px rgba(0, 0, 0, 0.6);
}
.senior-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 25%;
  display: block;
}
.senior-photo.main {
  position: relative;
  width: 64%;
  aspect-ratio: 4 / 5;
  margin-left: 0;
  transform: rotate(-2deg);
  z-index: 1;
  box-shadow:
    0 0 0 1px rgba(0, 240, 255, 0.25),
    0 0 30px rgba(0, 240, 255, 0.20),
    0 20px 40px rgba(0, 0, 0, 0.6);
}
.senior-photo.inset {
  position: absolute;
  right: 0;
  bottom: 0;
  width: 52%;
  aspect-ratio: 4 / 5;
  transform: rotate(4deg);
  z-index: 2;
  box-shadow:
    0 0 0 1px rgba(255, 43, 214, 0.3),
    0 0 30px rgba(255, 43, 214, 0.20),
    0 20px 40px rgba(0, 0, 0, 0.6);
}
.senior-card.v2.flip .senior-photo.main {
  margin-left: auto;
  margin-right: 0;
  transform: rotate(2deg);
  box-shadow:
    0 0 0 1px rgba(255, 43, 214, 0.25),
    0 0 30px rgba(255, 43, 214, 0.20),
    0 20px 40px rgba(0, 0, 0, 0.6);
}
.senior-card.v2.flip .senior-photo.inset {
  right: auto;
  left: 0;
  transform: rotate(-4deg);
  box-shadow:
    0 0 0 1px rgba(0, 240, 255, 0.3),
    0 0 30px rgba(0, 240, 255, 0.20),
    0 20px 40px rgba(0, 0, 0, 0.6);
}

.senior-corner {
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--cyan);
  border-style: solid;
  border-width: 0;
  z-index: 3;
  pointer-events: none;
  filter: drop-shadow(0 0 6px var(--cyan));
}
.senior-corner.tl { top: 5px; left: 5px; border-top-width: 2px; border-left-width: 2px; }
.senior-corner.tr { top: 5px; right: 5px; border-top-width: 2px; border-right-width: 2px; }
.senior-corner.bl { bottom: 5px; left: 5px; border-bottom-width: 2px; border-left-width: 2px; }
.senior-corner.br { bottom: 5px; right: 5px; border-bottom-width: 2px; border-right-width: 2px; }
.senior-photo.inset .senior-corner {
  border-color: var(--magenta);
  filter: drop-shadow(0 0 6px var(--magenta));
}
.senior-card.v2.flip .senior-photo.main .senior-corner {
  border-color: var(--magenta);
  filter: drop-shadow(0 0 6px var(--magenta));
}
.senior-card.v2.flip .senior-photo.inset .senior-corner {
  border-color: var(--cyan);
  filter: drop-shadow(0 0 6px var(--cyan));
}

.senior-meta {
  position: relative;
  z-index: 2;
}
.senior-frame {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}
.senior-num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--cyan);
  text-shadow: 0 0 8px var(--cyan);
  text-transform: uppercase;
}
.senior-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  color: var(--magenta);
  text-shadow: 0 0 8px var(--magenta);
  padding: 4px 10px;
  border: 1px solid var(--magenta);
  border-radius: 999px;
}
.senior-name {
  font-size: clamp(28px, 7.5vw, 38px);
  margin-bottom: 14px;
  line-height: 1.0;
}
.senior-quote {
  margin: 0;
  padding: 0;
}
.quote-text {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  color: var(--ink);
  font-style: italic;
  letter-spacing: 0.01em;
}

/* ============ NEON STICKERS ============ */
.sticker {
  position: absolute;
  z-index: 4;
  pointer-events: none;
  display: block;
  line-height: 0;
}
.sticker svg { display: block; }

@keyframes stickerPulse {
  0%, 100% { filter: drop-shadow(0 0 8px currentColor) drop-shadow(0 0 18px currentColor); }
  50%      { filter: drop-shadow(0 0 14px currentColor) drop-shadow(0 0 32px currentColor); }
}

.reduce-motion .sticker { animation: none !important; }

/* Cap — top-right negative space (Emma), top-left for flipped (Mikah) */
.sticker-cap {
  top: 18px;
  right: 6px;
  color: var(--cyan);
  transform: rotate(16deg);
  animation: stickerPulse 3.4s ease-in-out infinite;
}
.senior-card.v2.flip .sticker-cap {
  right: auto;
  left: 6px;
  transform: rotate(-16deg);
  color: var(--magenta);
}

/* ============ CAST ============ */
.search-row {
  display: flex; align-items: center; gap: 10px;
  background: rgba(10, 2, 30, 0.7);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 10px 16px;
  margin-bottom: 24px;
  color: var(--ink-dim);
  position: sticky;
  top: 56px;
  z-index: 30;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.search-row:focus-within {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,240,255,0.15);
}
.search-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  outline: none;
  padding: 4px 0;
}
.search-input::placeholder { color: var(--ink-faint); }
.search-clear {
  background: none; border: none; color: var(--ink-dim);
  cursor: pointer; padding: 4px;
  display: flex; align-items: center; justify-content: center;
}
.search-clear:hover { color: var(--cyan); }

.empty-state {
  text-align: center;
  color: var(--ink-dim);
  padding: 32px 16px;
  font-family: var(--font-mono);
  font-size: 13px;
}

.cast-letter-group { margin-bottom: 24px; }
.cast-letter {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 36px;
  color: transparent;
  -webkit-text-stroke: 1.5px var(--violet);
  letter-spacing: 0.05em;
  margin-bottom: 10px;
  line-height: 1;
  filter: drop-shadow(0 0 12px var(--violet));
}
.cast-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 6px;
}
.cast-name {
  padding: 10px 12px;
  background: rgba(20, 5, 45, 0.45);
  border-left: 2px solid var(--violet);
  border-radius: 0 8px 8px 0;
  font-size: 14px;
  color: var(--ink);
  transition: all 0.15s ease;
}
.cast-name:hover {
  border-left-color: var(--cyan);
  background: rgba(0, 240, 255, 0.08);
  transform: translateX(2px);
}

/* ============ PROGRAM ============ */
.prog-tools {
  display: flex; gap: 8px;
  margin-bottom: 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.prog-tool-btn {
  background: rgba(20, 5, 45, 0.6);
  border: 1px solid var(--line);
  color: var(--ink-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  padding: 8px 14px;
  border-radius: 999px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
.prog-tool-btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

.prog-list { display: flex; flex-direction: column; gap: 6px; }

.prog-row {
  background: linear-gradient(180deg, rgba(20, 5, 45, 0.55), rgba(10, 2, 30, 0.55));
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.prog-row.solo { border-style: dashed; }
.prog-row.open {
  border-color: var(--cyan);
  box-shadow: 0 0 0 1px rgba(0, 240, 255, 0.3), 0 8px 24px rgba(0, 240, 255, 0.15);
}
.prog-head {
  width: 100%;
  background: none;
  border: none;
  color: var(--ink);
  display: flex; align-items: center; gap: 14px;
  padding: 14px 14px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
}
.prog-num {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 22px;
  width: 50px;
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  filter: drop-shadow(0 0 10px rgba(0,240,255,0.4));
  text-align: center;
  letter-spacing: 0;
}
.prog-row.solo .prog-num {
  background: linear-gradient(135deg, var(--magenta), var(--violet));
  -webkit-background-clip: text;
  background-clip: text;
}
.prog-meta { flex: 1; min-width: 0; }
.prog-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 16px;
  letter-spacing: 0.03em;
  color: #fff;
  margin-bottom: 4px;
  text-shadow: 0 0 6px rgba(255,255,255,0.15);
}
.prog-sub {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: var(--ink-dim);
  flex-wrap: wrap;
}
.prog-group {
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
  color: var(--cyan);
  text-transform: uppercase;
  font-size: 11px;
}
.prog-solo {
  font-family: var(--font-mono);
  letter-spacing: 0.15em;
  color: var(--magenta);
  text-transform: uppercase;
  font-size: 11px;
}
.prog-dot { color: var(--ink-faint); }
.prog-count {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.05em;
}
.prog-chev {
  flex-shrink: 0;
  color: var(--ink-dim);
  transition: transform 0.25s ease, color 0.2s;
}
.prog-row.open .prog-chev { transform: rotate(180deg); color: var(--cyan); }

.prog-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.reduce-motion .prog-body { transition: none; }
.prog-body-inner {
  padding: 0 16px 18px 78px;
  border-top: 1px dashed var(--line);
  padding-top: 14px;
}
.prog-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 6px;
  margin-top: 8px;
}
.prog-label:first-child { margin-top: 0; }
.prog-dancers {
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink);
}
.prog-dancers.alt { color: var(--ink-dim); font-style: italic; }

/* Intermission */
.prog-intermission {
  display: flex; align-items: center; gap: 14px;
  padding: 28px 0;
  margin: 8px 0;
}
.int-bar {
  flex: 1; height: 2px;
  background: linear-gradient(90deg, transparent, var(--magenta), transparent);
  box-shadow: 0 0 10px var(--magenta);
  border-radius: 2px;
}
.int-label {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--magenta);
  text-shadow: 0 0 12px var(--magenta);
  text-transform: uppercase;
}

/* ============ ADS ============ */
.ads-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.ad-card {
  position: relative;
  background: rgba(10, 2, 30, 0.6);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 10px;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  font-family: inherit;
  color: inherit;
}
.ad-card:hover {
  transform: translateY(-3px);
  border-color: var(--cyan);
  box-shadow: 0 12px 32px rgba(0,240,255,0.18);
}
.ad-card img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 8px;
}
.ad-corner {
  position: absolute;
  width: 18px; height: 18px;
  border-color: var(--cyan);
  border-style: solid;
  border-width: 0;
  z-index: 2;
  pointer-events: none;
  filter: drop-shadow(0 0 6px var(--cyan));
}
.ad-corner.tl { top: 6px; left: 6px; border-top-width: 2px; border-left-width: 2px; border-top-left-radius: 8px; }
.ad-corner.tr { top: 6px; right: 6px; border-top-width: 2px; border-right-width: 2px; border-top-right-radius: 8px; }
.ad-corner.bl { bottom: 6px; left: 6px; border-bottom-width: 2px; border-left-width: 2px; border-bottom-left-radius: 8px; }
.ad-corner.br { bottom: 6px; right: 6px; border-bottom-width: 2px; border-right-width: 2px; border-bottom-right-radius: 8px; }

/* Ad modal */
.ad-modal {
  position: fixed; inset: 0;
  background: rgba(2, 0, 8, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  padding: 60px 12px 80px;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity: 0; } to { opacity: 1; } }
.ad-modal img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 10px;
  box-shadow: 0 0 60px rgba(0,240,255,0.3), 0 0 120px rgba(255,43,214,0.2);
}
.ad-modal-close {
  position: absolute;
  top: max(env(safe-area-inset-top, 16px), 16px);
  right: 16px;
  background: rgba(20,5,45,0.8);
  border: 1px solid var(--line-strong);
  color: var(--ink);
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 2;
}
.ad-modal-close:hover { border-color: var(--cyan); color: var(--cyan); }

.ad-modal-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(20,5,45,0.8);
  border: 1px solid var(--line-strong);
  color: var(--ink);
  width: 44px; height: 44px;
  border-radius: 50%;
  font-size: 26px;
  font-family: var(--font-display);
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 2;
}
.ad-modal-nav.left { left: 8px; }
.ad-modal-nav.right { right: 8px; }
.ad-modal-nav:hover { border-color: var(--cyan); color: var(--cyan); }

.ad-modal-counter {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--cyan);
  background: rgba(20,5,45,0.8);
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--line);

/* ============ FOOTER ============ */
.page-footer {
  max-width: 720px;
  margin: 40px auto 0;
  padding: 60px 20px calc(140px + env(safe-area-inset-bottom, 0px));
  text-align: center;
  border-top: 1px solid var(--line);
}
.page-footer > * { margin: 0 auto; }
.footer-title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: 0.3em;
  color: #fff;
  margin-top: 16px;

  color: var(--ink-dim);
  letter-spacing: 0.1em;

.footer-line.dim { color: var(--ink-faint); font-style: italic; }

/* ============ BOTTOM NAV ============ */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 0px));
  pointer-events: none;
}
.bottom-nav-inner {
  pointer-events: auto;
  max-width: 480px;
  margin: 0 auto;
  background: rgba(5, 0, 18, 0.85);

  -webkit-backdrop-filter: blur(20px) saturate(140%);

  border-radius: 18px;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 2px;
  padding: 6px;
  box-shadow: 0 -8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
}
.nav-btn {
  background: none;
  border: none;
  color: var(--ink-faint);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 8px 2px;
  cursor: pointer;
  border-radius: 12px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: all 0.15s ease;
  position: relative;

.nav-btn span { line-height: 1; }
.nav-btn svg { color: inherit; opacity: 0.8; }
.nav-btn.active {
  color: var(--cyan);
  background: rgba(0, 240, 255, 0.1);
  text-shadow: 0 0 8px var(--cyan);
}
.nav-btn.active svg { filter: drop-shadow(0 0 6px var(--cyan)); opacity: 1; }
.nav-btn:hover:not(.active) { color: var(--ink-dim); }

@media (max-width: 380px) {
  .nav-btn span { font-size: 8px; }
  .bottom-nav-inner { padding: 5px; }
}

/* Tweak control overrides — match neon aesthetic */
[id^="tweaks-panel"], .tweaks-panel {
  font-family: var(--font-body) !important;
}
