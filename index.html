<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Velocity · DDC 2026 Playbill</title>
<meta name="theme-color" content="#03000a" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ============ VELOCITY PLAYBILL — BASE ============ */
:root {
  --accent-hue: 285;
  --glow: 1;
  --cyan: #00f0ff;
  --magenta: #ff2bd6;
  --purple: #b624ff;
  --violet: hsl(var(--accent-hue), 90%, 60%);
  --violet-2: hsl(calc(var(--accent-hue) - 40), 95%, 55%);
  --bg-0: #03000a;
  --bg-1: #07021a;
  --bg-2: #0d0524;
  --ink: #f4f0ff;
  --ink-dim: #9b96b8;
  --ink-faint: #5b5677;
  --line: rgba(180, 130, 255, 0.18);
  --line-strong: rgba(180, 130, 255, 0.35);
  --font-display: 'Orbitron', 'Audiowide', system-ui, sans-serif;
  --font-body: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'IBM Plex Mono', monospace;
}

[data-accent-mode="mono"] {
  --cyan: #d8d3ff;
  --magenta: #b6aef0;
  --purple: #9a91d6;
  --violet: #cfc7ff;
  --violet-2: #aea4ff;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-0);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body {
  background:
    radial-gradient(ellipse at 20% 0%, rgba(120, 30, 200, 0.18), transparent 60%),
    radial-gradient(ellipse at 80% 30%, rgba(0, 200, 255, 0.12), transparent 50%),
    radial-gradient(ellipse at 50% 100%, rgba(255, 40, 200, 0.10), transparent 60%),
    linear-gradient(180deg, var(--bg-0), var(--bg-1) 50%, var(--bg-0));
  min-height: 100vh;
}

img { max-width: 100%; display: block; }

.app { position: relative; z-index: 1; }

/* ============ BACKGROUND ============ */
.bg-stage {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.bg-grid {
  position: absolute; inset: -10%;
  background-image:
    linear-gradient(rgba(180, 130, 255, 0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(180, 130, 255, 0.08) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  transform: perspective(800px) rotateX(55deg) translateY(20%);
  transform-origin: 50% 100%;
  opacity: calc(0.45 * var(--glow));
  animation: gridShift 30s linear infinite;
}
@keyframes gridShift {
  from { background-position: 0 0, 0 0; }
  to   { background-position: 0 60px, 60px 0; }
}
.no-grid .bg-grid { display: none; }

.bg-glow { position: absolute; border-radius: 50%; filter: blur(80px); opacity: calc(0.35 * var(--glow)); }
.bg-glow-1 { width: 500px; height: 500px; background: var(--cyan); top: -10%; left: -10%; }
.bg-glow-2 { width: 400px; height: 400px; background: var(--magenta); top: 40%; right: -15%; }
.bg-glow-3 { width: 450px; height: 450px; background: var(--purple); bottom: -10%; left: 30%; }

.reduce-motion .bg-grid { animation: none; }

/* ============ TYPOGRAPHY ============ */
.neon-text {
  font-family: var(--font-display);
  font-weight: 800;
  letter-spacing: 0.08em;
  color: #fff;
  text-shadow:
    0 0 calc(8px * var(--glow)) var(--cyan),
    0 0 calc(20px * var(--glow)) var(--cyan),
    0 0 calc(40px * var(--glow)) var(--violet),
    0 0 calc(70px * var(--glow)) var(--magenta);
  position: relative;
}

.dim { color: var(--ink-dim); }

/* ============ COVER ============ */
.cover {
  position: relative;
  width: 100%;
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0 0 32px;
  z-index: 2;
}
.cover-image-wrap {
  position: relative;
  width: 100%;
  max-width: 480px;
  margin-top: max(env(safe-area-inset-top, 0px), 0px);
  overflow: visible;
}
.cover-image {
  width: 100%;
  height: auto;
  display: block;
  transform-origin: 50% 45%;
  filter: drop-shadow(0 0 40px rgba(0, 200, 255, 0.35)) drop-shadow(0 30px 60px rgba(180, 60, 255, 0.25));
  animation: coverGrow linear both;
  animation-timeline: scroll(root);
  animation-range: 0 100vh;
}

@keyframes coverGrow {
  from { transform: scale(0.78); }
  to   { transform: scale(1.22); }
}

/* Fallback for browsers without scroll-driven animations */
@supports not (animation-timeline: scroll()) {
  .cover-image {
    animation: coverGrowFallback 1.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes coverGrowFallback {
    from { transform: scale(0.78); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
}

.reduce-motion .cover-image {
  animation: none;
  transform: none;
}

.cover-cta {
  margin-top: 24px;
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 22px;
  background: linear-gradient(90deg, var(--violet-2), var(--violet));
  color: #fff;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.18em;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 999px;
  cursor: pointer;
  text-transform: uppercase;
  box-shadow:
    0 0 calc(20px * var(--glow)) var(--violet-2),
    0 0 calc(40px * var(--glow)) rgba(255, 43, 214, 0.4),
    inset 0 1px 0 rgba(255,255,255,0.3);
  transition: transform 0.15s ease, box-shadow 0.2s ease;
}
.cover-cta:hover { transform: translateY(-2px); }
.cover-cta:active { transform: translateY(0); }

/* ============ MASTHEAD ============ */
.masthead {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: rgba(5, 0, 18, 0.85);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  border-bottom: 1px solid var(--line);
}
.masthead-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.25em;
  color: #fff;
  text-shadow: 0 0 12px rgba(0,240,255,0.5);
}

/* ============ VELOCITY PLAYBILL — SECTIONS ============ */

.content { position: relative; z-index: 2; }

.page {
  padding: 56px 20px 24px;
  max-width: 720px;
  margin: 0 auto;
  scroll-margin-top: 60px;
}

/* ============ SECTION HEADER ============ */
.section-header { text-align: center; margin-bottom: 32px; }
.kicker {
  display: flex; align-items: center; gap: 10px;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 14px;
  text-shadow: 0 0 8px var(--cyan);
}
.kicker-line {
  height: 1px; width: 40px;
  background: linear-gradient(90deg, transparent, var(--cyan));
}
.kicker-line:last-child {
  background: linear-gradient(90deg, var(--cyan), transparent);
}
.section-title {
  font-size: clamp(28px, 7vw, 42px);
  margin: 0;
  line-height: 1.05;
}
.section-sub {
  margin-top: 12px;
  color: var(--ink-dim);
  font-size: 14px;
  letter-spacing: 0.04em;
  max-width: 36ch;
  margin-left: auto;
  margin-right: auto;
}

/* ============ DIVIDER ============ */
.divider {
  display: flex; align-items: center; gap: 14px;
  max-width: 320px;
  margin: 24px auto;
  color: var(--violet);
}
.div-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--violet), transparent);
  box-shadow: 0 0 8px var(--violet);
}
.div-bolt {
  filter: drop-shadow(0 0 8px var(--cyan));
  color: var(--cyan);
}

/* ============ WELCOME / LETTER ============ */
.letter {
  background: linear-gradient(180deg, rgba(20, 5, 45, 0.6), rgba(10, 2, 30, 0.6));
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 28px 22px;
  font-size: 15.5px;
  line-height: 1.65;
  color: var(--ink);
  position: relative;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset, 0 20px 50px rgba(0,0,0,0.5);
}
.letter::before {
  content: "";
  position: absolute; inset: -1px;
  border-radius: 16px;
  padding: 1px;
  background: linear-gradient(135deg, var(--cyan), transparent 40%, transparent 60%, var(--magenta));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.6;
  pointer-events: none;
}
.letter p { margin: 0 0 14px; }
.letter p:first-child::first-letter {
  font-family: var(--font-display);
  font-size: 2.3em;
  float: left;
  line-height: 1;
  padding: 2px 10px 0 0;
  color: var(--cyan);
  text-shadow: 0 0 12px var(--cyan);
}
.signature {
  display: flex; align-items: center; gap: 14px;
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px dashed var(--line);
}
.sig-line {
  width: 40px; height: 2px;
  background: linear-gradient(90deg, var(--cyan), var(--magenta));
  box-shadow: 0 0 10px var(--cyan);
  border-radius: 2px;
}
.sig-name {
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.08em;
  font-size: 14px;
  color: #fff;
}
.sig-role {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--ink-dim);
  text-transform: uppercase;
  margin-top: 2px;
}

/* ============ STAFF ============ */
.staff-owner {
  text-align: center;
  padding: 14px 0 22px;
  margin-bottom: 24px;
  position: relative;
}
.owner-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--cyan);
  text-shadow: 0 0 8px var(--cyan);
  padding: 6px 14px;
  border: 1px solid var(--cyan);
  border-radius: 999px;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.owner-name {
  font-size: clamp(16px, 3.5vw, 20px);
  line-height: 1.2;
}

.staff-group { margin-bottom: 28px; }
.group-label {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--magenta);
  text-shadow: 0 0 8px var(--magenta);
  text-transform: uppercase;
  margin-bottom: 14px;
}
.staff-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
}
.staff-chip {
  padding: 14px 14px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: rgba(20, 5, 45, 0.5);
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.01em;
  position: relative;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.staff-chip:hover {
  border-color: var(--cyan);
  box-shadow: 0 0 16px rgba(0,240,255,0.3);
}
.staff-chip::before {
  content: ""; position: absolute; top: 8px; left: 8px;
  width: 4px; height: 4px;
  background: var(--cyan);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--cyan);
}
.staff-chip.alt::before { background: var(--magenta); box-shadow: 0 0 6px var(--magenta); }

/* ============ SENIORS ============ */
.senior-grid {
  display: grid;
  gap: 28px;
}
.senior-card.v2 {
  position: relative;
  border: 1px solid var(--line-strong);
  border-radius: 20px;
  padding: 22px 20px 24px;
  background:
    radial-gradient(ellipse at 0% 0%, rgba(0, 240, 255, 0.10), transparent 55%),
    radial-gradient(ellipse at 100% 100%, rgba(255, 43, 214, 0.10), transparent 55%),
    linear-gradient(180deg, rgba(20, 5, 45, 0.85), rgba(8, 2, 22, 0.9));
  overflow: hidden;
  box-shadow:
    0 30px 60px rgba(0, 0, 0, 0.5),
    0 0 0 1px rgba(255, 255, 255, 0.03) inset;
}
.senior-card.v2::before {
  content: "";
  position: absolute; inset: -1px;
  border-radius: 20px;
  padding: 1px;
  background: linear-gradient(135deg, var(--cyan), transparent 30%, transparent 70%, var(--magenta));
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.7;
  pointer-events: none;
  z-index: 1;
}

.senior-watermark {
  position: absolute;
  right: -10px;
  bottom: -30px;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(180px, 50vw, 240px);
  line-height: 0.85;
  color: transparent;
  -webkit-text-stroke: 1.5px rgba(180, 130, 255, 0.18);
  letter-spacing: -0.04em;
  pointer-events: none;
  z-index: 0;
}

.senior-photos {
  position: relative;
  margin-bottom: 18px;
  z-index: 2;
  padding-bottom: 60px; /* room for hanging inset photo */
}
.senior-photo {
  margin: 0;
  background: #000;
  border-radius: 10px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.05),
    0 20px 40px rgba(0, 0, 0, 0.6);
}
.senior-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 25%;
  display: block;
}
.senior-photo.main {
  position: relative;
  width: 64%;
  aspect-ratio: 4 / 5;
  margin-left: 0;
  transform: rotate(-2deg);
  z-index: 1;
  box-shadow:
    0 0 0 1px rgba(0, 240, 255, 0.25),
    0 0 30px rgba(0, 240, 255, 0.20),
    0 20px 40px rgba(0, 0, 0, 0.6);
}
.senior-photo.inset {
  position: absolute;
  right: 0;
  bottom: 0;
  width: 52%;
  aspect-ratio: 4 / 5;
  transform: rotate(4deg);
  z-index: 2;
  box-shadow:
    0 0 0 1px rgba(255, 43, 214, 0.3),
    0 0 30px rgba(255, 43, 214, 0.20),
    0 20px 40px rgba(0, 0, 0, 0.6);
}
.senior-card.v2.flip .senior-photo.main {
  margin-left: auto;
  margin-right: 0;
  transform: rotate(2deg);
  box-shadow:
    0 0 0 1px rgba(255, 43, 214, 0.25),
    0 0 30px rgba(255, 43, 214, 0.20),
    0 20px 40px rgba(0, 0, 0, 0.6);
}
.senior-card.v2.flip .senior-photo.inset {
  right: auto;
  left: 0;
  transform: rotate(-4deg);
  box-shadow:
    0 0 0 1px rgba(0, 240, 255, 0.3),
    0 0 30px rgba(0, 240, 255, 0.20),
    0 20px 40px rgba(0, 0, 0, 0.6);
}

.senior-corner {
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--cyan);
  border-style: solid;
  border-width: 0;
  z-index: 3;
  pointer-events: none;
  filter: drop-shadow(0 0 6px var(--cyan));
}
.senior-corner.tl { top: 5px; left: 5px; border-top-width: 2px; border-left-width: 2px; }
.senior-corner.tr { top: 5px; right: 5px; border-top-width: 2px; border-right-width: 2px; }
.senior-corner.bl { bottom: 5px; left: 5px; border-bottom-width: 2px; border-left-width: 2px; }
.senior-corner.br { bottom: 5px; right: 5px; border-bottom-width: 2px; border-right-width: 2px; }
.senior-photo.inset .senior-corner {
  border-color: var(--magenta);
  filter: drop-shadow(0 0 6px var(--magenta));
}
.senior-card.v2.flip .senior-photo.main .senior-corner {
  border-color: var(--magenta);
  filter: drop-shadow(0 0 6px var(--magenta));
}
.senior-card.v2.flip .senior-photo.inset .senior-corner {
  border-color: var(--cyan);
  filter: drop-shadow(0 0 6px var(--cyan));
}

.senior-meta {
  position: relative;
  z-index: 2;
}
.senior-frame {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}
.senior-num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--cyan);
  text-shadow: 0 0 8px var(--cyan);
  text-transform: uppercase;
}
.senior-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  color: var(--magenta);
  text-shadow: 0 0 8px var(--magenta);
  padding: 4px 10px;
  border: 1px solid var(--magenta);
  border-radius: 999px;
}
.senior-name {
  font-size: clamp(28px, 7.5vw, 38px);
  margin-bottom: 14px;
  line-height: 1.0;
}
.senior-quote {
  margin: 0;
  padding: 0;
}
.quote-text {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  color: var(--ink);
  font-style: italic;
  letter-spacing: 0.01em;
}

/* ============ NEON STICKERS ============ */
.sticker {
  position: absolute;
  z-index: 4;
  pointer-events: none;
  display: block;
  line-height: 0;
}
.sticker svg { display: block; }

@keyframes stickerPulse {
  0%, 100% { filter: drop-shadow(0 0 8px currentColor) drop-shadow(0 0 18px currentColor); }
  50%      { filter: drop-shadow(0 0 14px currentColor) drop-shadow(0 0 32px currentColor); }
}

.reduce-motion .sticker { animation: none !important; }

/* Cap — top-right negative space (Emma), top-left for flipped (Mikah) */
.sticker-cap {
  top: 18px;
  right: 6px;
  color: var(--cyan);
  transform: rotate(16deg);
  animation: stickerPulse 3.4s ease-in-out infinite;
}
.senior-card.v2.flip .sticker-cap {
  right: auto;
  left: 6px;
  transform: rotate(-16deg);
  color: var(--magenta);
}

/* ============ CAST ============ */
.search-row {
  display: flex; align-items: center; gap: 10px;
  background: rgba(10, 2, 30, 0.7);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 10px 16px;
  margin-bottom: 24px;
  color: var(--ink-dim);
  position: sticky;
  top: 56px;
  z-index: 30;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.search-row:focus-within {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(0,240,255,0.15);
}
.search-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  outline: none;
  padding: 4px 0;
}
.search-input::placeholder { color: var(--ink-faint); }
.search-clear {
  background: none; border: none; color: var(--ink-dim);
  cursor: pointer; padding: 4px;
  display: flex; align-items: center; justify-content: center;
}
.search-clear:hover { color: var(--cyan); }

.empty-state {
  text-align: center;
  color: var(--ink-dim);
  padding: 32px 16px;
  font-family: var(--font-mono);
  font-size: 13px;
}

.cast-letter-group { margin-bottom: 24px; }
.cast-letter {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 36px;
  color: transparent;
  -webkit-text-stroke: 1.5px var(--violet);
  letter-spacing: 0.05em;
  margin-bottom: 10px;
  line-height: 1;
  filter: drop-shadow(0 0 12px var(--violet));
}
.cast-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 6px;
}
.cast-name {
  padding: 10px 12px;
  background: rgba(20, 5, 45, 0.45);
  border-left: 2px solid var(--violet);
  border-radius: 0 8px 8px 0;
  font-size: 14px;
  color: var(--ink);
  transition: all 0.15s ease;
}
.cast-name:hover {
  border-left-color: var(--cyan);
  background: rgba(0, 240, 255, 0.08);
  transform: translateX(2px);
}

/* ============ PROGRAM ============ */
.prog-tools {
  display: flex; gap: 8px;
  margin-bottom: 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.prog-tool-btn {
  background: rgba(20, 5, 45, 0.6);
  border: 1px solid var(--line);
  color: var(--ink-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  padding: 8px 14px;
  border-radius: 999px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;

.prog-tool-btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
}

.prog-list { display: flex; flex-direction: column; gap: 6px; }

.prog-row {
  background: linear-gradient(180deg, rgba(20, 5, 45, 0.55), rgba(10, 2, 30, 0.55));
  border: 1px solid var(--line);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.prog-row.solo { border-style: dashed; }
.prog-row.open {
  border-color: var(--cyan);
  box-shadow: 0 0 0 1px rgba(0, 240, 255, 0.3), 0 8px 24px rgba(0, 240, 255, 0.15);
}
.prog-head {
  width: 100%;
  background: none;
  border: none;
  color: var(--ink);
  display: flex; align-items: center; gap: 14px;
  padding: 14px 14px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
}
.prog-num {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 22px;
  width: 50px;
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  filter: drop-shadow(0 0 10px rgba(0,240,255,0.4));
  text-align: center;
  letter-spacing: 0;
}
.prog-row.solo .prog-num {
  background: linear-gradient(135deg, var(--magenta), var(--violet));
  -webkit-background-clip: text;
  background-clip: text;
}
.prog-meta { flex: 1; min-width: 0; }
.prog-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 16px;
  letter-spacing: 0.03em;
  color: #fff;
  margin-bottom: 4px;
  text-shadow: 0 0 6px rgba(255,255,255,0.15);
}
.prog-sub {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: var(--ink-dim);
  flex-wrap: wrap;
}
.prog-group {
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
  color: var(--cyan);
  text-transform: uppercase;
  font-size: 11px;
}
.prog-solo {
  font-family: var(--font-mono);
  letter-spacing: 0.15em;
  color: var(--magenta);
  text-transform: uppercase;
  font-size: 11px;
}
.prog-dot { color: var(--ink-faint); }
.prog-count {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.05em;
}
.prog-chev {
  flex-shrink: 0;
  color: var(--ink-dim);
  transition: transform 0.25s ease, color 0.2s;
}
.prog-row.open .prog-chev { transform: rotate(180deg); color: var(--cyan); }

.prog-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.reduce-motion .prog-body { transition: none; }
.prog-body-inner {
  padding: 0 16px 18px 78px;
  border-top: 1px dashed var(--line);
  padding-top: 14px;
}
.prog-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 6px;
  margin-top: 8px;
}
.prog-label:first-child { margin-top: 0; }
.prog-dancers {
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink);
}
.prog-dancers.alt { color: var(--ink-dim); font-style: italic; }

/* Intermission */

  display: flex; align-items: center; gap: 14px;
  padding: 28px 0;
  margin: 8px 0;
}
.int-bar {
  flex: 1; height: 2px;
  background: linear-gradient(90deg, transparent, var(--magenta), transparent);
  box-shadow: 0 0 10px var(--magenta);
  border-radius: 2px;
}
.int-label {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--magenta);
  text-shadow: 0 0 12px var(--magenta);
  text-transform: uppercase;
}

/* ============ ADS ============ */
.ads-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.ad-card {
  position: relative;
  background: rgba(10, 2, 30, 0.6);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 10px;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  font-family: inherit;
  color: inherit;
}
.ad-card:hover {
  transform: translateY(-3px);
  border-color: var(--cyan);
  box-shadow: 0 12px 32px rgba(0,240,255,0.18);
}
.ad-card img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 8px;
}
.ad-corner {
  position: absolute;
  width: 18px; height: 18px;
  border-color: var(--cyan);
  border-style: solid;
  border-width: 0;
  z-index: 2;
  pointer-events: none;
  filter: drop-shadow(0 0 6px var(--cyan));
}
.ad-corner.tl { top: 6px; left: 6px; border-top-width: 2px; border-left-width: 2px; border-top-left-radius: 8px; }
.ad-corner.tr { top: 6px; right: 6px; border-top-width: 2px; border-right-width: 2px; border-top-right-radius: 8px; }
.ad-corner.bl { bottom: 6px; left: 6px; border-bottom-width: 2px; border-left-width: 2px; border-bottom-left-radius: 8px; }
.ad-corner.br { bottom: 6px; right: 6px; border-bottom-width: 2px; border-right-width: 2px; border-bottom-right-radius: 8px; }

/* Ad modal */
.ad-modal {
  position: fixed; inset: 0;
  background: rgba(2, 0, 8, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  padding: 60px 12px 80px;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity: 0; } to { opacity: 1; } }
.ad-modal img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 10px;
  box-shadow: 0 0 60px rgba(0,240,255,0.3), 0 0 120px rgba(255,43,214,0.2);
}
.ad-modal-close {
  position: absolute;
  top: max(env(safe-area-inset-top, 16px), 16px);
  right: 16px;
  background: rgba(20,5,45,0.8);
  border: 1px solid var(--line-strong);
  color: var(--ink);
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 2;
}
.ad-modal-close:hover { border-color: var(--cyan); color: var(--cyan); }

.ad-modal-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(20,5,45,0.8);
  border: 1px solid var(--line-strong);
  color: var(--ink);
  width: 44px; height: 44px;
  border-radius: 50%;
  font-size: 26px;
  font-family: var(--font-display);
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 2;
}
.ad-modal-nav.left { left: 8px; }
.ad-modal-nav.right { right: 8px; }
.ad-modal-nav:hover { border-color: var(--cyan); color: var(--cyan); }

.ad-modal-counter {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--cyan);
  background: rgba(20,5,45,0.8);
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--line);

/* ============ FOOTER ============ */
.page-footer {
  max-width: 720px;

  padding: 60px 20px calc(140px + env(safe-area-inset-bottom, 0px));
  text-align: center;
  border-top: 1px solid var(--line);
}
.page-footer > * { margin: 0 auto; }
.footer-title {

  letter-spacing: 0.1em;

.footer-line.dim { color: var(--ink-faint); font-style: italic; }

/* ============ BOTTOM NAV ============ */
.bottom-nav {
  position: fixed;

  gap: 2px;
  padding: 6px;

.nav-btn span { line-height: 1; }
.nav-btn svg { color: inherit; opacity: 0.8; }

.nav-btn.active svg { filter: drop-shadow(0 0 6px var(--cyan)); opacity: 1; }

[id^="tweaks-panel"], .tweaks-panel {

}

// ── useTweaks ───────────────────────────────────────────────────────────────
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

<script type="text/babel">
/* global React, ReactDOM */
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ============ TWEAK DEFAULTS ============
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentHue": 285,
  "glowIntensity": 1,
  "reduceMotion": false,
  "showGrid": true,
  "accentMode": "neon"
}/*EDITMODE-END*/;

// ============ ICONS ============
const Icon = {
  bolt: (p) => <svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z"/></svg>,
  gradCap: (p) => (
    <svg viewBox="0 0 80 60" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M5 22 L40 8 L75 22 L40 36 Z" />
      <path d="M18 28 L18 40 C18 44 28 47 40 47 C52 47 62 44 62 40 L62 28" />
      <circle cx="40" cy="22" r="1.6" fill="currentColor" />
      <path d="M62 24 L66 32 L66 44" />
      <path d="M64 44 Q66 50 68 44 Z" fill="currentColor" />
    </svg>
  ),
  diploma: (p) => (
    <svg viewBox="0 0 64 48" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M10 12 L10 36 C10 40 12 42 16 42 L48 42 C52 42 54 40 54 36 L54 12 C54 8 52 6 48 6 L16 6 C12 6 10 8 10 12 Z" />
      <path d="M16 18 L48 18 M16 24 L42 24 M16 30 L46 30" strokeOpacity="0.6" />

  ),
  spark: (p) => (

      <path d="M12 2 L13.5 10 L22 11.5 L13.5 13 L12 22 L10.5 13 L2 11.5 L10.5 10 Z" />
    </svg>
  ),
  arrow: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12h14m-6-6 6 6-6 6"/></svg>,
  letter: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>,
  staff: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="9" cy="8" r="3"/><circle cx="17" cy="10" r="2.5"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M15 19c0-2.5 2-4.5 4.5-4.5"/></svg>,
  star: (p) => <svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="m12 2 2.6 6.6L22 9.7l-5.4 4.7L18.4 22 12 18.1 5.6 22l1.8-7.6L2 9.7l7.4-1.1L12 2Z"/></svg>,
  users: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="8" r="3.5"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>,
  list: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>,
  ad: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="4" width="18" height="14" rx="2"/><path d="m3 8 9 5 9-5"/><circle cx="17" cy="6" r="2" fill="currentColor"/></svg>,
  search: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" {...p}><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>,
  chevron: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="m6 9 6 6 6-6"/></svg>,
  close: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" {...p}><path d="M6 6 18 18M6 18 18 6"/></svg>,
};

// ============ DDC LOGO (recreated) ============
function DDCLogo({ size = 28, color = "currentColor" }) {
  return (
    <svg viewBox="0 0 120 40" width={size * 3} height={size} style={{ display: "block" }}>
      <text x="36" y="28" fontFamily="'Orbitron', sans-serif" fontWeight="800" fontSize="22" fill={color} letterSpacing="2">DDC</text>
      <g stroke={color} strokeWidth="1.5" strokeLinecap="round" fill="none" opacity="0.9">
        <path d="M4 34 L 28 34" />
        <path d="M22 30 L 28 34 L 22 38" />
        <path d="M8 36 L 12 36" opacity="0.7" />
        <path d="M4 32 L 8 32" opacity="0.5" />
      </g>
    </svg>
  );
}

// ============ COVER ============
function Cover({ onEnter }) {
  return (
    <section className="cover" data-screen-label="01 Cover">
      <div className="cover-image-wrap">
        <img src="assets/cover-glow.png" alt="Velocity 2026" className="cover-image" />
      </div>
      <button className="cover-cta" onClick={onEnter}>
        <span>Open Playbill</span>
        <Icon.arrow width="18" height="18" />
      </button>
    </section>
  );
}

// ============ SECTION HEADER ============
function SectionHeader({ kicker, title, subtitle }) {
  return (
    <header className="section-header">
      <div className="kicker">
        <span className="kicker-line" />
        <span className="kicker-text">{kicker}</span>
        <span className="kicker-line" />
      </div>
      <h2 className="section-title neon-text" data-text={title}>{title}</h2>
      {subtitle && <p className="section-sub">{subtitle}</p>}
    </header>
  );
}

// ============ WELCOME ============
function Welcome({ data }) {
  return (
    <section id="welcome" className="page" data-screen-label="02 Welcome">
      <SectionHeader kicker="01 / Welcome" title="A NOTE FROM DDC" />
      <div className="letter">
        {data.body.map((p, i) => <p key={i}>{p}</p>)}
        <div className="signature">
          <div className="sig-line" />
          <div>
            <div className="sig-name">{data.from}</div>
            <div className="sig-role">{data.role}</div>
          </div>
        </div>
      </div>
    </section>
  );
}

// ============ STAFF ============
function Staff({ data }) {
  return (
    <section id="staff" className="page" data-screen-label="03 Staff">
      <SectionHeader kicker="02 / Staff" title="THE TEAM" subtitle="The dancers above, the people behind them." />

      <div className="staff-owner">
        <div className="owner-badge">Owner & Creative Director</div>
        <div className="owner-name neon-text" data-text={data.owner.name}>{data.owner.name}</div>
      </div>

      <div className="staff-group">
        <div className="group-label"><Icon.bolt width="14" height="14" /> Teachers</div>
        <div className="staff-grid">
          {data.teachers.map(n => (
            <div key={n} className="staff-chip">{n}</div>
          ))}
        </div>
      </div>

      <div className="staff-group">
        <div className="group-label"><Icon.bolt width="14" height="14" /> Assistants</div>
        <div className="staff-grid">
          {data.assistants.map(n => (
            <div key={n} className="staff-chip alt">{n}</div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ============ SENIORS ============
function Seniors({ data }) {
  return (
    <section id="seniors" className="page" data-screen-label="04 Seniors">
      <SectionHeader kicker="03 / Class of 2026" title="OUR SENIORS" subtitle="A decade on this stage. Tonight, we send them off." />
      <div className="senior-grid">
        {data.map((s, i) => (
          <article key={s.name} className={`senior-card v2 ${i % 2 ? "flip" : ""}`}>
            <div className="senior-watermark" aria-hidden="true">26</div>

            <div className="sticker sticker-cap" aria-hidden="true">
              <Icon.gradCap width="130" height="98" />
            </div>

            <div className="senior-photos">
              <figure className="senior-photo main">
                <span className="senior-corner tl" />
                <span className="senior-corner tr" />
                <span className="senior-corner bl" />
                <span className="senior-corner br" />
                <img src={s.photos[0]} alt={`${s.name} portrait 1`} />
              </figure>
              <figure className="senior-photo inset">
                <span className="senior-corner tl" />
                <span className="senior-corner tr" />
                <span className="senior-corner bl" />
                <span className="senior-corner br" />
                <img src={s.photos[1]} alt={`${s.name} portrait 2`} />
              </figure>
            </div>

            <div className="senior-meta">
              <div className="senior-frame">
                <div className="senior-tag">CLASS OF 2026</div>
              </div>
              <div className="senior-name neon-text" data-text={s.name}>{s.name}</div>
              <blockquote className="senior-quote">
                <span className="quote-text">Congratulations! We will miss you!</span>
              </blockquote>
            </div>
          </article>
        ))}
      </div>
    </section>
  );
}

// ============ CAST ============
function Cast({ data }) {
  const [q, setQ] = useState("");
  const filtered = useMemo(() => {
    if (!q.trim()) return data;
    const needle = q.toLowerCase();
    return data.filter(n => n.toLowerCase().includes(needle));
  }, [q, data]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(name => {
      const first = name[0].toUpperCase();
      (g[first] ||= []).push(name);
    });
    return g;
  }, [filtered]);

  return (
    <section id="cast" className="page" data-screen-label="05 Cast">
      <SectionHeader kicker="04 / Cast" title="THE COMPANY" subtitle={`${data.length} dancers, one stage`} />
      <div className="search-row">
        <Icon.search width="16" height="16" />
        <input
          type="text"
          placeholder="Search dancers…"
          value={q}
          onChange={e => setQ(e.target.value)}
          className="search-input"
        />
        {q && <button className="search-clear" onClick={() => setQ("")} aria-label="Clear"><Icon.close width="14" height="14" /></button>}
      </div>

      {Object.keys(grouped).length === 0 ? (
        <div className="empty-state">No dancers matching "{q}"</div>
      ) : (
        Object.entries(grouped).map(([letter, names]) => (
          <div key={letter} className="cast-letter-group">
            <div className="cast-letter">{letter}</div>
            <div className="cast-grid">
              {names.map(n => <div key={n} className="cast-name">{n}</div>)}
            </div>
          </div>
        ))
      )}
    </section>
  );
}

// ============ PROGRAM ============
function ProgramRow({ item, open, onToggle }) {
  const isSolo = !item.group;
  const dancerCount = item.dancers ? item.dancers.split(",").length : 0;
  return (
    <div className={`prog-row ${open ? "open" : ""} ${isSolo ? "solo" : ""}`}>
      <button className="prog-head" onClick={onToggle} aria-expanded={open}>
        <div className="prog-num">{String(item.n).padStart(2, "0")}</div>
        <div className="prog-meta">
          <div className="prog-title">{item.title}</div>
          <div className="prog-sub">
            {item.group ? <span className="prog-group">{item.group}</span> : <span className="prog-solo">Solo</span>}
            <span className="prog-dot">•</span>
            <span className="prog-count">{dancerCount} {dancerCount === 1 ? "dancer" : "dancers"}</span>
          </div>
        </div>
        <div className="prog-chev"><Icon.chevron width="18" height="18" /></div>
      </button>
      <div className="prog-body" style={{ maxHeight: open ? "600px" : 0 }}>
        <div className="prog-body-inner">
          <div className="prog-label">Performed by</div>
          <div className="prog-dancers">{item.dancers}</div>
          {item.assistant && (
            <>
              <div className="prog-label">Assistant{item.assistant.includes(",") ? "s" : ""}</div>
              <div className="prog-dancers alt">{item.assistant}</div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function Program({ data }) {
  const [openIdx, setOpenIdx] = useState(null);
  const [showAll, setShowAll] = useState(false);

  return (
    <section id="program" className="page" data-screen-label="06 Program">
      <SectionHeader kicker="05 / Program" title="THE SHOW" subtitle="59 routines. 1 intermission. Tap any number to see who's on stage." />

      <div className="prog-tools">
        <button className="prog-tool-btn" onClick={() => { setOpenIdx(null); }}>Collapse all</button>
        <button className="prog-tool-btn" onClick={() => setShowAll(s => !s)}>{showAll ? "Hide all dancers" : "Show all dancers"}</button>
      </div>

      <div className="prog-list">
        {data.map((item, i) => {
          if (item.intermission) {
            return (
              <div key="int" className="prog-intermission">
                <div className="int-bar" />
                <div className="int-label">— Intermission —</div>
                <div className="int-bar" />
              </div>
            );
          }
          const open = showAll || openIdx === i;
          return (
            <ProgramRow
              key={item.n}
              item={item}
              open={open}
              onToggle={() => setOpenIdx(openIdx === i ? null : i)}
            />
          );
        })}
      </div>
    </section>
  );
}

// ============ ADS ============
function Ads({ data }) {
  const [active, setActive] = useState(null);

  return (
    <section id="ads" className="page" data-screen-label="07 Ads">
      <SectionHeader kicker="06 / Ads" title="SHOUTOUTS & SPONSORS" subtitle="The families and businesses behind the season." />

      <div className="ads-grid">
        {data.map((ad, i) => (
          <button key={i} className="ad-card" onClick={() => setActive(i)}>
            <div className="ad-corner tl" />
            <div className="ad-corner tr" />
            <div className="ad-corner bl" />
            <div className="ad-corner br" />
            <img src={ad.src} alt={ad.alt} loading="lazy" />
          </button>
        ))}
      </div>

      {active !== null && (
        <div className="ad-modal" onClick={() => setActive(null)}>
          <button className="ad-modal-close" onClick={() => setActive(null)} aria-label="Close"><Icon.close width="22" height="22" /></button>
          <button
            className="ad-modal-nav left"
            onClick={(e) => { e.stopPropagation(); setActive((active - 1 + data.length) % data.length); }}
            aria-label="Previous"
          >‹</button>
          <img
            src={data[active].src}
            alt={data[active].alt}
            onClick={e => e.stopPropagation()}
          />
          <button
            className="ad-modal-nav right"
            onClick={(e) => { e.stopPropagation(); setActive((active + 1) % data.length); }}
            aria-label="Next"
          >›</button>
          <div className="ad-modal-counter">{active + 1} / {data.length}</div>
        </div>
      )}
    </section>
  );
}

// ============ FOOTER ============
function Footer() {
  return (
    <footer className="page-footer">
      <DDCLogo size={32} color="rgba(255,255,255,0.85)" />
      <div className="footer-title">VELOCITY · 2026</div>
      <div className="footer-line">Duggan's Dance Center</div>
      <div className="footer-line dim">Thank you for moving with us tonight.</div>
    </footer>
  );
}

// ============ BOTTOM NAV ============
const NAV_ITEMS = [
  { id: "welcome", label: "Welcome", icon: Icon.letter },
  { id: "staff", label: "Staff", icon: Icon.staff },
  { id: "seniors", label: "Seniors", icon: Icon.star },
  { id: "cast", label: "Cast", icon: Icon.users },
  { id: "program", label: "Program", icon: Icon.list },
  { id: "ads", label: "Ads", icon: Icon.ad },
];

function BottomNav({ active, onNav }) {
  return (
    <nav className="bottom-nav">
      <div className="bottom-nav-inner">
        {NAV_ITEMS.map(item => {
          const I = item.icon;
          return (
            <button
              key={item.id}
              className={`nav-btn ${active === item.id ? "active" : ""}`}
              onClick={() => onNav(item.id)}
            >
              <I width="20" height="20" />
              <span>{item.label}</span>
            </button>
          );
        })}
      </div>
    </nav>
  );
}

// ============ MAIN APP ============
function App() {
  const [tweaks, setTweak] = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : [TWEAK_DEFAULTS, () => {}];
  const [active, setActive] = useState("cover");
  const [entered, setEntered] = useState(false);
  const containerRef = useRef(null);

  // Apply tweaks to CSS vars
  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--accent-hue", tweaks.accentHue);
    root.style.setProperty("--glow", tweaks.glowIntensity);
    root.classList.toggle("reduce-motion", !!tweaks.reduceMotion);
    root.classList.toggle("no-grid", !tweaks.showGrid);
    root.setAttribute("data-accent-mode", tweaks.accentMode || "neon");
  }, [tweaks]);

  // Scroll spy
  useEffect(() => {
    const ids = ["welcome", "staff", "seniors", "cast", "program", "ads"];
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) setActive(e.target.id);
      });
    }, { rootMargin: "-40% 0px -50% 0px" });
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, [entered]);

  const handleNav = useCallback((id) => {
    const el = document.getElementById(id);
    if (el) {
      const y = el.getBoundingClientRect().top + window.pageYOffset - 12;
      window.scrollTo({ top: y, behavior: "smooth" });
    }
  }, []);

  const handleEnter = useCallback(() => {
    setEntered(true);
    requestAnimationFrame(() => {
      const el = document.getElementById("welcome");
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  }, []);

  const D = window.PLAYBILL;

  return (
    <div className="app" ref={containerRef}>
      <div className="bg-stage" aria-hidden="true">
        <div className="bg-grid" />
        <div className="bg-glow bg-glow-1" />
        <div className="bg-glow bg-glow-2" />
        <div className="bg-glow bg-glow-3" />
      </div>

      <Cover onEnter={handleEnter} />

      <div className="masthead">
        <DDCLogo size={20} color="rgba(255,255,255,0.85)" />
        <div className="masthead-title">VELOCITY <span className="dim">/ 2026</span></div>
      </div>

      <main className="content">
        <Welcome data={D.welcome} />
        <Divider />
        <Staff data={D.staff} />
        <Divider />
        <Seniors data={D.seniors} />
        <Divider />
        <Cast data={D.cast} />
        <Divider />
        <Program data={D.program} />
        <Divider />
        <Ads data={D.ads} />
        <Footer />
      </main>

      <BottomNav active={active} onNav={handleNav} />

      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="Color">
            <window.TweakSlider label="Accent hue" value={tweaks.accentHue} min={0} max={360} step={5} onChange={v => setTweak("accentHue", v)} suffix="°" />
            <window.TweakRadio label="Accent mode" value={tweaks.accentMode} options={[
              { label: "Neon", value: "neon" },
              { label: "Mono", value: "mono" },
            ]} onChange={v => setTweak("accentMode", v)} />
          </window.TweakSection>
          <window.TweakSection title="Effects">
            <window.TweakSlider label="Glow intensity" value={tweaks.glowIntensity} min={0} max={2} step={0.1} onChange={v => setTweak("glowIntensity", v)} />
            <window.TweakToggle label="Background grid" value={tweaks.showGrid} onChange={v => setTweak("showGrid", v)} />
            <window.TweakToggle label="Reduce motion" value={tweaks.reduceMotion} onChange={v => setTweak("reduceMotion", v)} />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </div>
  );
}

function Divider() {
  return (
    <div className="divider" aria-hidden="true">
      <span className="div-line" />
      <span className="div-bolt"><Icon.bolt width="14" height="14" /></span>
      <span className="div-line" />
    </div>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
